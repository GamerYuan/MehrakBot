name: mehrakcore
services:
  bot:
    image: mehrak:latest
    build:
      context: ./MehrakBot
      dockerfile: Services/Bot/Dockerfile
      args:
        VERSION: ${VERSION:-0.0.1}
    depends_on:
      application:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweed-s3:
        condition: service_healthy
    networks:
      - mehrak-network
    environment:
      - DOTNET_ENVIRONMENT=Production
      - Discord__Token=${DISCORD_TOKEN}
      - ConnectionStrings__redis=redis:6379,password=${REDIS_PASSWORD}
      - ConnectionStrings__mehrakdb=Host=postgres;Port=5432;Database=mehrak_dev;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__application=${APPLICATION_CONNECTION_STRING}
      - ClickHouse__Username=${CLICKHOUSE_USER}
      - ClickHouse__Password=${CLICKHOUSE_PASSWORD}
      - Storage__SecretKey=${SEAWEED_SECRET_KEY}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=MehrakBot
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=Delta

  dashboard:
    image: mehrak-dashboard:latest
    build:
      context: ./MehrakBot
      dockerfile: Services/Dashboard/Dockerfile
      args:
        VERSION: ${VERSION:-0.0.1}
      secrets:
        - sixlabors-license
    depends_on:
      application:
        condition: service_started
      image-processor:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweed-s3:
        condition: service_healthy
    networks:
      - mehrak-network
      - seaweed-network
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://*:5000
      - Dashboard__AdminDiscordId=${DASHBOARD_ADMIN_DISCORD_ID}
      - Dashboard__Origin=${DASHBOARD_ORIGIN}
      - Discord__ClientId=${DISCORD_CLIENT_ID}
      - Discord__ClientSecret=${DISCORD_CLIENT_SECRET}
      - SeaweedFiler__BaseUrl=http://seaweed-filer:8888
      - ConnectionStrings__redis=redis:6379,password=${REDIS_PASSWORD}
      - ConnectionStrings__mehrakdb=Host=postgres;Port=5432;Database=mehrak_dev;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__application=${APPLICATION_CONNECTION_STRING}
      - ConnectionStrings__image-processor=${IMAGE_PROCESSOR_CONNECTION_STRING}
      - Storage__SecretKey=${SEAWEED_SECRET_KEY}
      - Nginx__KnownProxy=${NGINX_KNOWN_PROXY}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=MehrakDashboard
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=Delta
    volumes:
      - ./certificates/server-encryption-certificate.pfx:/app/server-encryption-certificate.pfx:ro
      - ./certificates/server-signing-certificate.pfx:/app/server-signing-certificate.pfx:ro

  application:
    image: mehrak-application:latest
    build:
      context: ./MehrakBot
      dockerfile: Services/Application/Dockerfile
      args:
        BASE_IMAGE_TAG: ${BASE_IMAGE_TAG:-opencv-4.12.0-ocvsharp-4.11.0.20250507}
        VERSION: ${VERSION:-0.0.1}
      secrets:
        - sixlabors-license
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweed-s3:
        condition: service_healthy
    networks:
      - mehrak-network
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://*:12000
      - ConnectionStrings__redis=redis:6379,password=${REDIS_PASSWORD}
      - ConnectionStrings__mehrakdb=Host=postgres;Port=5432;Database=mehrak_dev;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__image-processor=${IMAGE_PROCESSOR_CONNECTION_STRING}
      - Storage__SecretKey=${SEAWEED_SECRET_KEY}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=MehrakApplication
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=Delta
    volumes:
      - ./MehrakBot/Assets:/app/Assets:ro

  image-processor:
    image: mehrak-image-processor:latest
    build:
      context: ./MehrakBot
      dockerfile: Services/ImageProcessor/Dockerfile
      args:
        BASE_IMAGE_TAG: ${BASE_IMAGE_TAG:-opencv-4.13.0-ocvsharp-4.13.0.20260627}
        VERSION: ${VERSION:-0.0.1}
    depends_on:
      seaweed-s3:
        condition: service_healthy
    networks:
      - mehrak-network
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://*:13000
      - NsfwClassifier__NsfwThreshold=${NSFW_THRESHOLD:-0.7}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=MehrakImageProcessor
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=Delta
    volumes:
      - ./MehrakBot/Assets:/app/Assets:ro

  postgres:
    image: postgres:18.3
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d mehrak_dev"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - pgdata:/data/postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=mehrak_dev
      - PGDATA=/data/postgres
    networks:
      - mehrak-network

  redis:
    image: redis:8.6
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    networks:
      - mehrak-network

  grafana:
    image: grafana/grafana:12.3
    container_name: grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_SERVER_DOMAIN=${GRAFANA_DOMAIN}
      - GF_SERVER_ROOT_URL=https://${GRAFANA_DOMAIN}
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_STRICT_TRANSPORT_SECURITY=true
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_COOKIE_SAMESITE=strict
    networks:
      - mehrak-network

  nginx:
    image: nginx:1.31.2
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - grafana
    networks:
      - mehrak-network

  seaweed-master:
    image: chrislusf/seaweedfs:4.35
    command: "master -mdir=/data -ip=seaweed-master -ip.bind=0.0.0.0"
    restart: unless-stopped
    ports:
      - "9333:9333"
      - "19333:19333"
    volumes:
      - ./seaweed-master:/data
    networks:
      - mehrak-network
      - seaweed-network

  seaweed-volume:
    image: chrislusf/seaweedfs:4.35
    command: "volume -mserver=seaweed-master:9333 -dir=/data -ip=seaweed-volume -preStopSeconds=1"
    restart: unless-stopped
    depends_on:
      - seaweed-master
    ports:
      - "8080:8080"
      - "18080:18080"
    volumes:
      - ./seaweed-volume:/data
    networks:
      - seaweed-network

  seaweed-filer:
    image: chrislusf/seaweedfs:4.35
    command: 'filer -master="seaweed-master:9333" -ip=seaweed-filer'
    restart: unless-stopped
    depends_on:
      - seaweed-master
      - seaweed-volume
    ports:
      - "8888:8888"
      - "18888:18888"
    volumes:
      - ./seaweed-filer:/data
    networks:
      - seaweed-network

  seaweed-s3:
    image: chrislusf/seaweedfs:4.35
    command: 's3 -filer="seaweed-filer:8888" -ip.bind=0.0.0.0 -port=8333 -config=/etc/seaweedfs/s3.json'
    restart: unless-stopped
    depends_on:
      - seaweed-filer
    ports:
      - "8333:8333"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./seaweed-s3/s3.json:/etc/seaweedfs/s3.json:ro
    networks:
      - seaweed-network
      - mehrak-network

  clickhouse:
    image: clickhouse/clickhouse-server:26.2
    healthcheck:
      test:
        [
          "CMD",
          "clickhouse-client",
          "--password",
          "${CLICKHOUSE_PASSWORD}",
          "--query",
          "SELECT 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - clickhouse_data:/var/lib/clickhouse/
      - clickhouse_logs:/var/log/clickhouse-server/
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    networks:
      - mehrak-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.154.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml
      - /proc:/hostfs/proc:ro
      - /sys:/hostfs/sys:ro
      - /:/rootfs:ro
    environment:
      - HOST_PROC=/hostfs/proc
      - HOST_SYS=/hostfs/sys
      - HOST_ETC=/hostfs/etc
      - HOST_VAR=/hostfs/var
      - HOST_RUN=/hostfs/run
      - HOST_DEV=/hostfs/dev
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - mehrak-network

networks:
  mehrak-network:
    driver: bridge
  seaweed-network:
    driver: bridge

secrets:
  sixlabors-license:
    file: ./MehrakBot/sixlabors.lic

volumes:
  pgdata:
  redis_data:
  grafana-data:
  clickhouse_data:
  clickhouse_logs:
