name: Deploy
permissions:
  contents: read
  packages: read

on:
  push:
    tags:
      - "v*"

env:
  TAG_NAME: ${{ github.ref_name }}

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Derive build version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive
          token: ${{ secrets.ASSETS_PAT }}

      - name: Checkout LFS
        run: git lfs pull

      - name: Setup SixLabors License
        env:
          SIXLABORS_LICENSE: ${{ secrets.SIXLABORS_LICENSE }}
        run: printf '%s' "$SIXLABORS_LICENSE" > MehrakBot/sixlabors.lic

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker images
        env:
          VERSION: ${{ env.VERSION }}
          BASE_IMAGE_TAG: opencv-4.12.0-ocvsharp-4.11.0.20250507
          BUILDX_BAKE_GIT_AUTH_TOKEN: ${{ secrets.ASSETS_PAT }}
        run: |
          docker buildx bake \
            --set '*.args.VERSION='"$VERSION" \
            --set '*.args.BASE_IMAGE_TAG='"$BASE_IMAGE_TAG" \
            --set '*.cache-from=type=gha' \
            --set '*.cache-to=type=gha,mode=max' \
            --load

      - name: Cleanup SixLabors License
        if: always()
        run: rm -f MehrakBot/sixlabors.lic

      - name: Export Docker images
        run: |
          set -euo pipefail
          docker image save \
            mehrak:latest \
            mehrak-dashboard:latest \
            mehrak-application:latest \
            -o mehrak-images.tar
          chmod 644 mehrak-images.tar

      - name: Upload image archive to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: mehrak-images.tar
          target: /tmp

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -euo pipefail
            docker load -i /tmp/mehrak-images.tar
            rm -f /tmp/mehrak-images.tar
            cd ${{ secrets.BOT_CORE_PATH }}
            git fetch --tags
            git checkout ${{ env.TAG_NAME }}
            docker compose up -d --remove-orphans --no-build
            docker image prune -af --filter "until=24h"
