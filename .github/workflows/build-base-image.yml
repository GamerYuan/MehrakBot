name: Build Base Image
permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:
    inputs:
      opencv_version:
        description: "OpenCV version to build"
        required: true
        default: "4.13.0"
      opencvsharp_version:
        description: "OpenCvSharp release tag"
        required: true
        default: "4.13.0.20260627"

jobs:
  build-base:
    name: Build & Push Base Image
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: ./MehrakBot
          file: ./MehrakBot/Services/ImageProcessor/Dockerfile.base
          push: true
          tags: |
            ghcr.io/gameryuan/mehrak-app-base:opencv-${{ inputs.opencv_version }}
            ghcr.io/gameryuan/mehrak-app-base:opencv-${{ inputs.opencv_version }}-ocvsharp-${{ inputs.opencvsharp_version }}
          build-args: |
            OPENCV_VERSION=${{ inputs.opencv_version }}
            OPENCVSHARP_VERSION=${{ inputs.opencvsharp_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
