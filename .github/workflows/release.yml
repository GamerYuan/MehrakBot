name: Create Release
permissions:
  contents: write
  actions: write
on:
  push:
    tags:
      - "v*"
jobs:
  create_release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false
          
      - name: Setup Git Credentials
        env: 
          ASSETS_PAT: ${{ secrets.ASSETS_PAT }}
        run: |
          git config --global url."https://GamerYuan:${ASSETS_PAT}@git.yuan-dev.com/".insteadOf "https://git.yuan-dev.com/"
          git config --global credential.helper store
          echo "https://GamerYuan:${ASSETS_PAT}@git.yuan-dev.com" > ~/.git-credentials
          git lfs install
          git config --global lfs.transfer.enableHrefRewrite true

      - name: Checkout Submodule and Pull LFS
        run: |
          git submodule update --init --recursive

      - name: Create Assets Archive
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [ -d "MehrakBot/Assets" ]; then
            echo "Creating assets archive..."
            cd MehrakBot/Assets
            zip -r "../../assets-$TAG_NAME.zip" . -x "*.git*" ".gitattributes"
          else
            echo "No assets directory found!"
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            assets-${{ github.ref_name }}.zip
