name: Create Release
permissions:
  contents: write
  actions: write
on:
  push:
    tags:
      - "v*"
jobs:
  create_release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ASSETS_PAT }}
          submodules: recursive

      - name: Get submodule SHA for LFS cache key
        id: submod
        run: echo "sha=$(git -C MehrakBot/Assets rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Cache LFS objects
        id: lfs-cache
        uses: actions/cache@v4
        with:
          path: |
            .git/lfs
            .git/modules/**/lfs
          key: lfs-${{ runner.os }}-${{ steps.submod.outputs.sha }}
          restore-keys: |
            lfs-${{ runner.os }}-

      - name: Pull LFS objects
        if: steps.lfs-cache.outputs.cache-hit != 'true'
        run: |
          git lfs pull
          git submodule foreach --recursive 'git lfs pull'

      - name: Create Assets Archive
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [ -d "MehrakBot/Assets" ]; then
            echo "Creating assets archive..."
            cd MehrakBot/Assets
            zip -r "../../assets-$TAG_NAME.zip" . -x "*.git*" ".gitattributes"
          else
            echo "No assets directory found!"
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            assets-${{ github.ref_name }}.zip
