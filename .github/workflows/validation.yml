name: Validation
permissions:
  contents: write
  actions: write
  checks: write

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Setup Git Credentials
        env: 
          ASSETS_PAT: ${{ secrets.ASSETS_PAT }}
        run: |
          git config --global url."https://GamerYuan:${ASSETS_PAT}@git.yuan-dev.com/".insteadOf "https://git.yuan-dev.com/"
          git config --global credential.helper store
          echo "https://GamerYuan:${ASSETS_PAT}@git.yuan-dev.com" > ~/.git-credentials
          git lfs install
          git config --global lfs.transfer.enableHrefRewrite true

      - name: Checkout Submodule and Pull LFS
        run: |
          git submodule update --init --recursive

      - name: Setup SixLabors License
        env:
          SIXLABORS_LICENSE: ${{ secrets.SIXLABORS_LICENSE }}
        run: printf '%s' "$SIXLABORS_LICENSE" > MehrakBot/sixlabors.lic

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        working-directory: ./MehrakBot
        run: dotnet restore

      - name: Build solution
        working-directory: ./MehrakBot
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        working-directory: ./MehrakBot
        run: dotnet test
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}

      - name: Upload test output artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-output-images
          path: MehrakBot/Services/Application/Mehrak.Application.Tests/bin/Debug/net10.0/Output/
          if-no-files-found: ignore
